<?xml version="1.0" encoding="UTF-8"?>
<svg width="1920" height="1080" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c0c1d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a3e;stop-opacity:1" />
    </linearGradient>
    <filter id="glowGreen">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowPurple">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bgGrad)"/>
  
  <!-- Particle effect -->
  <circle cx="200" cy="200" r="2" fill="#4ecdc4" opacity="0.6"/>
  <circle cx="400" cy="150" r="3" fill="#4ecdc4" opacity="0.4"/>
  <circle cx="600" cy="300" r="2" fill="#a66efa" opacity="0.5"/>
  <circle cx="800" cy="100" r="2" fill="#a66efa" opacity="0.6"/>
  <circle cx="1000" cy="250" r="3" fill="#4ecdc4" opacity="0.3"/>
  <circle cx="1200" cy="180" r="2" fill="#4ecdc4" opacity="0.5"/>
  <circle cx="1400" cy="320" r="2" fill="#a66efa" opacity="0.4"/>
  
  <!-- Project Name - Left -->
  <text x="180" y="380" font-family="Arial, sans-serif" font-size="64" font-weight="bold" fill="white">
    SOVEREIGN PATCH AGENT
  </text>
  
  <text x="180" y="440" font-family="Arial, sans-serif" font-size="24" fill="#aaa">
    Automated | Secure | Intelligent
  </text>
  
  <!-- Abstract 3D Circuit Elements - Right -->
  <g transform="translate(1200, 200)">
    <rect x="0" y="0" width="80" height="80" fill="#1a3a5e" stroke="#4ecdc4" stroke-width="2" filter="url(#glowGreen)"/>
    <rect x="100" y="50" width="80" height="80" fill="#1a1a3e" stroke="#a66efa" stroke-width="2" filter="url(#glowPurple)"/>
    <rect x="200" y="0" width="80" height="80" fill="#1a3a5e" stroke="#4ecdc4" stroke-width="2" filter="url(#glowGreen)"/>
    <line x1="40" y1="40" x2="140" y2="90" stroke="#4ecdc4" stroke-width="2"/>
    <line x1="140" y1="50" x2="240" y2="90" stroke="#a66efa" stroke-width="2"/>
    <line x1="240" y1="40" x2="140" y2="90" stroke="#4ecdc4" stroke-width="2"/>
  </g>
  
  <!-- Feature Icons - Bottom Right -->
  <g transform="translate(1200, 700)">
    <rect x="0" y="0" width="180" height="60" rx="8" fill="#1a3a5e" stroke="#4ecdc4" stroke-width="1"/>
    <text x="90" y="38" font-family="Arial" font-size="16" fill="white" text-anchor="middle">Vulnerability Scanner</text>
    
    <rect x="200" y="0" width="180" height="60" rx="8" fill="#1a1a3e" stroke="#a66efa" stroke-width="1"/>
    <text x="290" y="38" font-family="Arial" font-size="16" fill="white" text-anchor="middle">Patch Generator</text>
    
    <rect x="400" y="0" width="180" height="60" rx="8" fill="#1a3a5e" stroke="#ff6b6b" stroke-width="1"/>
    <text x="490" y="38" font-family="Arial" font-size="16" fill="white" text-anchor="middle">Security Audit</text>
  </g>
</svg>